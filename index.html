<!DOCTYPE html>

<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HandSpeak</title>

<style>
body {
    font-family: 'Segoe UI';
    background: linear-gradient(135deg, #0f172a, #020617);
    color: white;
    text-align: center;
    margin: 0;
}

h1 {
    margin-top: 30px;
    font-size: 2.5em;
    letter-spacing: 2px;
}

p {
    opacity: 0.7;
}

.container {
    background: #111827;
    padding: 30px;
    border-radius: 20px;
    max-width: 850px;
    margin: 30px auto;
    box-shadow: 0 0 30px rgba(0, 255, 255, 0.1);
}

.status {
    margin: 20px;
    padding: 12px;
    border-radius: 10px;
    font-weight: bold;
}

.waiting { background: #facc15; color: black; }
.connected { background: #22c55e; }
.error { background: #ef4444; }

button {
    padding: 15px;
    margin: 10px;
    border-radius: 12px;
    border: none;
    background: #06b6d4;
    color: white;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #0891b2;
    transform: scale(1.08);
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    margin-top: 20px;
}
</style>

</head>

<body>

<h1>🤖 HandSpeak</h1>
<p>Sistema inteligente de tradução para Libras</p>

<div class="container">

<div id="status" class="status waiting">
Clique em "Iniciar Sistema"
</div>

<button onclick="iniciar()">🚀 Iniciar Sistema</button>

<div class="grid">
<button onclick="enviar('OI')">👋 OI</button>
<button onclick="enviar('TCHAU')">👋 TCHAU</button>
<button onclick="enviar('OBRIGADO')">🙏 OBRIGADO</button>
<button onclick="enviar('DESCULPA')">😔 DESCULPA</button>
<button onclick="enviar('SIM')">👍 SIM</button>
<button onclick="enviar('NAO')">👎 NÃO</button>
<button onclick="enviar('AJUDA')">🆘 AJUDA</button>
<button onclick="enviar('AMOR')">❤️ AMOR</button>
<button onclick="enviar('FOME')">🍽️ FOME</button>
<button onclick="enviar('SEDE')">💧 SEDE</button>
<button onclick="enviar('BOM_DIA')">☀️ BOM DIA</button>
<button onclick="enviar('BOA_NOITE')">🌙 BOA NOITE</button>
</div>

</div>

<script>
let port, writer;

async function iniciar() {
    try {
        document.getElementById("status").innerText = "Conectando...";
        document.getElementById("status").className = "status waiting";

        port = await navigator.serial.requestPort();
        await port.open({ baudRate: 9600 });
        writer = port.writable.getWriter();

        document.getElementById("status").innerText = "Sistema conectado!";
        document.getElementById("status").className = "status connected";

    } catch {
        document.getElementById("status").innerText = "Erro na conexão";
        document.getElementById("status").className = "status error";
    }
}

async function enviar(cmd) {
    if (!writer) {
        alert("Conecte o sistema primeiro!");
        return;
    }

    document.getElementById("status").innerText = "Executando: " + cmd;

    await writer.write(new TextEncoder().encode(cmd + "\n"));
}
</script>

</body>
</html>
